services:
  app:
    build: .
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./database:/app/database
      - ./config.json:/app/config.json
      - ./static:/app/static

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - app

volumes:
  caddy_data:
